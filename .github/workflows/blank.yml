name: Build Tab A9+ Standard GKI (WiFi Fixed)
on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    container: ubuntu:20.04

    steps:
      - name: 🛠️ Prepare Environment
        run: |
          apt-get update
          apt-get install -y software-properties-common
          add-apt-repository universe
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git bc build-essential flex bison libssl-dev libelf-dev \
            clang llvm lld gcc-aarch64-linux-gnu \
            tar zip wget python3 cpio xz-utils dos2unix curl \
            device-tree-compiler

      - name: 📥 Checkout Kernel Source
        uses: actions/checkout@v4

      - name: 🩹 Apply Deep Source Code Fixes
        run: |
          make ARCH=arm64 mrproper
          
          # 1. PRECISE TRACE FIXES 
          sed -i 's|#define TRACE_INCLUDE_PATH .*|#define TRACE_INCLUDE_PATH ../../kernel/sched/walt|g' kernel/sched/walt/trace.h || true
          sed -i 's|#define TRACE_INCLUDE_PATH .*|#define TRACE_INCLUDE_PATH ../../arch/arm64/kernel|g' arch/arm64/kernel/perf_trace_counters.h || true
          grep -rnl "#define TRACE_INCLUDE_PATH ." . | xargs sed -i 's|#define TRACE_INCLUDE_PATH \.|#define TRACE_INCLUDE_PATH ./|g' || true
          
          # 2. CFLAGS & HEADER FIXES
          find . -name "Makefile" -o -name "Kbuild" | xargs sed -i '/ccflags-y/ s/$/ -I$(src)/' || true

          # 3. DISABLE INTERNAL DTC 
          sed -i 's/subdir-y += dtc/#subdir-y += dtc/' scripts/Makefile || true
          echo "hostprogs-y :=" > scripts/dtc/Makefile
          echo "always :=" >> scripts/dtc/Makefile

          # 4. REMOVE STRICT PROTOTYPE FLAGS
          find . -name "Makefile" -o -name "Kbuild" | xargs sed -i 's/=strict-prototypes//g' || true
          
          # 5. USB-C HEADER FLATTENER
          find drivers/usb/typec -type d -name "inc" | while read -r incdir; do
            parent=$(dirname "$incdir")
            cp -r "$incdir"/* "$parent/" || true
          done
          find drivers/usb/typec -type f -exec sed -i 's|#include "inc/|#include "|g' {} +
          
          # 6. STRIP 'q' BRANDING
          find . -type f -name "gta9pwifi_eur_open_defconfig" -exec sed -i 's/qgki/gki/g' {} + || true
          sed -i 's/qgki/gki/g' Makefile || true

          # 7. 🛑 FOCALTECH TOUCHSCREEN FIRMWARE FIX
          # Create empty dummy files to satisfy the missing firmware includes
          mkdir -p drivers/input/touchscreen/focaltech_touch_spi/include/firmware
          touch drivers/input/touchscreen/focaltech_touch_spi/include/firmware/fw_sample.i
          mkdir -p include/firmware
          touch include/firmware/fw_sample.i

      - name: ⚙️ Kernel Config & Hardware Force-In
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gta9pwifi_eur_open_defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          
          # Force connectivity built-ins
          ./scripts/config --file .config -e CONFIG_WLAN -e CONFIG_QCACLD_WLAN -e CONFIG_WLAN_VENDOR_QCOM -e CONFIG_INPUT_SENSORHUB -e CONFIG_SENSORS_SSC
          ./scripts/config --file .config --set-str CONFIG_LOCALVERSION "-gki"
          
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

      - name: 🔨 Compile
        run: |
          echo "-28972655-abX210XXS6CYB9" > .scmversion
          touch build.log
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 LLVM_IAS=1 HOSTCC=gcc CC=clang \
            DTC=$(which dtc) \
            WERROR=0 KCFLAGS="-w -I$(pwd)" \
            -j$(nproc --all) Image 2>&1 | tee build.log

      - name: 📋 Build Summary
        if: always()
        run: |
          if [ -s build.log ]; then
            echo "::group::❌ VIEW ALL ERRORS"
            grep -i "error:" build.log || echo "No errors found."
            echo "::endgroup::"
          fi

      - name: 📦 Package Output
        if: success()
        run: |
          if [ -f arch/arm64/boot/Image ]; then
            git clone https://github.com/osm0sis/AnyKernel3.git
            sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
            cp arch/arm64/boot/Image AnyKernel3/
            cd AnyKernel3 && zip -r9 ../TabA9Plus-GKI-Fixed.zip *
          else
            exit 1
          fi

      - name: 📤 Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TabA9Plus-GKI-Fixed
          path: TabA9Plus-GKI-Fixed.zip
