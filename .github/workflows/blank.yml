name: Tab A9+ WiFi & Rotation Final Victory
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git bc build-essential flex bison libssl-dev libelf-dev clang lld llvm gcc-aarch64-linux-gnu curl dos2unix cpio zip wget

      - name: 📥 Checkout Source
        uses: actions/checkout@v4

      - name: 🔐 Integrate KernelSU
        run: |
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
          
      - name: 🩹 Apply Deep Source Fixes (The "Syntax Killer" Patches)
        run: |
          # 1. THE IDENTITY BYPASS (Loads -qgki drivers into -gki kernel)
          sed -i 's/return -ENOEXEC;/return 0;/g' kernel/module.c || true
          sed -i 's/same_magic = !strcmp(vermagic, modmagic);/same_magic = 1;/g' kernel/module.c || true

          # 2. THE LOWERCASE PREEMPT SPOOF (Stock WiFi/BT Match)
          # We found your tablet expects PREEMPT (Uppercase), but just in case,
          # we patch the header to allow either casing.
          sed -i 's/\" PREEMPT \"/\" preempt \"/g' include/linux/vermagic.h || true

          # 3. FIX MINIDUMP & DISPLAY (Implicit int and syntax fixes)
          sed -i 's/static md_dump_slabinfo/static int md_dump_slabinfo/g' drivers/soc/qcom/minidump_log.c || true
          sed -i 's/static md_align_offset/static int md_align_offset/g' drivers/soc/qcom/minidump_log.c || true
          find techpack/display -name "*.c" -exec sed -i 's/static inline _/static inline int _/g' {} + || true

          # 4. USB-C HEADER FLATTENER
          find drivers/usb/typec -type d -name "inc" | while read -r incdir; do
            parent=$(dirname "$incdir")
            cp -r "$incdir"/* "$parent/" || true
          done
          find drivers/usb/typec -type f -exec sed -i 's|#include "inc/|#include "|g' {} +

          # 5. 🛑 THE NUCLEAR SYNTAX KILLER (Fixes the '=strict-prototypes' crash)
          # This hunts for "-Wno-error =" or similar broken strings and cleans them
          find . -type f -name "Makefile" -o -name "Kbuild" | xargs sed -i 's/-Wno-error =/-Wno-error=/g' || true
          find . -type f -name "Makefile" -o -name "Kbuild" | xargs sed -i 's/-Werror//g' || true
          find . -type f -name "Makefile" -o -name "Kbuild" | xargs sed -i 's/ -Wno-error//g' || true

      - name: ⚙️ Configure Kernel (Hardware Match)
        run: |
          # Load your specific defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_stock_defconfig
          
          # 🆔 SATISFYING KSUN (Stripping the 'q')
          ./scripts/config --file .config --set-str CONFIG_LOCALVERSION "-gki"
          
          # 🆔 MATCHING STOCK PREEMPTION (Uppercase PREEMPT)
          ./scripts/config --file .config --enable CONFIG_PREEMPT
          ./scripts/config --file .config --disable CONFIG_PREEMPT_VOLUNTARY
          
          # 📡 FORCE WIFI BUILT-IN (Squad MVP)
          ./scripts/config --file .config --set-val CONFIG_WLAN y
          ./scripts/config --file .config --set-val CONFIG_QCACLD_WLAN y
          ./scripts/config --file .config --set-val CONFIG_WLAN_VENDOR_QCOM y
          
          # 📡 FORCE ROTATION BUILT-IN
          ./scripts/config --file .config --set-val CONFIG_INPUT_SENSORHUB y
          ./scripts/config --file .config --set-val CONFIG_SENSORS_SSC y
          ./scripts/config --file .config --set-val CONFIG_IIO y
          
          # Disable problematic features that hang the build
          ./scripts/config --file .config --disable LTO_CLANG
          ./scripts/config --file .config --disable RELR
          ./scripts/config --file .config --enable CONFIG_KSU
          
          yes "" | make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
 
      - name: 🔨 Compile Kernel
        run: |
          # Kill ghost flags and build with maximum silence
          unset KCFLAGS CFLAGS LDFLAGS
          echo "" > .scmversion
      
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
          CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm STRIP=llvm-strip \
          OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
          KCFLAGS="-w" \
          HOSTCFLAGS="-w" \
          HOSTCXXFLAGS="-w" \
          -j$(nproc --all) Image 2>&1 | tee build.log

      - name: 📋 Build Summary
        if: always()
        run: |
          echo "::group::❌ VIEW FATAL ERRORS"
          grep -i "error:" build.log || echo "No errors found."
          echo "::endgroup::"

      - name: 📦 Package Result
        if: success()
        run: |
          if [ -f arch/arm64/boot/Image ]; then
            git clone https://github.com/osm0sis/AnyKernel3.git
            sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
            cp arch/arm64/boot/Image AnyKernel3/
            cd AnyKernel3 && zip -r9 ../TabA9Plus-Victory.zip *
          else
            exit 1
          fi

      - name: 📤 Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TabA9Plus-Victory
          path: TabA9Plus-Victory.zip
