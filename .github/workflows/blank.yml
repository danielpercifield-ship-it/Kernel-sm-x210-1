name: Tab A9+ Standard GKI (WiFi & Rotation Victory)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git bc build-essential flex bison libssl-dev libelf-dev clang lld llvm gcc-aarch64-linux-gnu curl dos2unix cpio zip wget

      - name: 📥 Checkout Source
        uses: actions/checkout@v4

      - name: 🔐 Integrate KernelSU
        run: |
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
          
      - name: 🩹 Apply Source Patches
        run: |
          # 1. THE WALT TRACE FIX
          sed -i '1i ccflags-y += -I$(src)' kernel/sched/walt/Makefile
          sed -i 's|#define TRACE_INCLUDE_PATH .|#define TRACE_INCLUDE_PATH ../../kernel/sched/walt|g' kernel/sched/walt/trace.h
          
          # 2. THE IDENTITY SPOOF (Harlequin Move)
          # We remove the lowercase preempt patch because your tablet expects UPPERCASE PREEMPT
          sed -i 's/return -ENOEXEC;/return 0;/g' kernel/module.c || true
          sed -i 's/same_magic = !strcmp(vermagic, modmagic);/same_magic = 1;/g' kernel/module.c || true

          # 3. SAMSUNG/QUALCOMM TYPO FIXES (The "Scrapper" cleanup)
          sed -i 's/static md_dump_slabinfo/static int md_dump_slabinfo/g' drivers/soc/qcom/minidump_log.c || true
          sed -i 's/static md_align_offset/static int md_align_offset/g' drivers/soc/qcom/minidump_log.c || true
          sed -i 's/void try_schedule_zs_compact()/void try_schedule_zs_compact(void)/g' mm/zsmalloc.c || true
          
          # 4. USB-C HEADER FLATTENER
          find drivers/usb/typec -type d -name "inc" | while read -r incdir; do
            parent=$(dirname "$incdir")
            cp -r "$incdir"/* "$parent/" || true
          done
          find drivers/usb/typec -type f -exec sed -i 's|#include "inc/|#include "|g' {} +

          # 5. NUCLEAR MAKEFILE CLEANUP
          find . -name "Makefile" -o -name "Kbuild" | xargs sed -i 's/-Werror//g' || true

      - name: ⚙️ Configure Kernel
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_stock_defconfig
          
          # 🛑 SET THE CLEAN NAME (satisfying KSUN)
          ./scripts/config --file .config --set-str CONFIG_LOCALVERSION "-gki"
          
          # 🛑 THE PREEMPTION MATCH (Stock said 'PREEMPT' uppercase, so we enable Full PREEMPT)
          ./scripts/config --file .config --enable CONFIG_PREEMPT
          ./scripts/config --file .config --disable CONFIG_PREEMPT_VOLUNTARY
          
          # 🛑 FORCE HARDWARE BUILT-IN (Squad MVP)
          ./scripts/config --file .config --set-val CONFIG_WLAN y
          ./scripts/config --file .config --set-val CONFIG_QCACLD_WLAN y
          ./scripts/config --file .config --set-val CONFIG_INPUT_SENSORHUB y
          ./scripts/config --file .config --set-val CONFIG_SENSORS_SSC y
          ./scripts/config --file .config --set-val CONFIG_IIO y
          
          ./scripts/config --file .config --enable CONFIG_KSU
          yes "" | make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

      - name: 🔨 Compile Kernel
        run: |
          # The stock fingerprint helps Bluetooth turn on
          echo "-28972655-abX210XXS6CYB9" > .scmversion
          
          export ARCH=arm64
          # Simplified compile to prevent shell errors while keeping KSUN headers active
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 HOSTCC=gcc CC=clang \
          KCFLAGS="-w -D__LINUX_ARM_ARCH__=8 -I$(pwd)/security/selinux/include -I$(pwd)/drivers" \
          -j$(nproc --all) Image

      - name: 📦 Package Result
        if: success()
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          cp arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          zip -r9 ../TabA9Plus-Victory-Build.zip *

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TabA9Plus-WiFi-BT-Rotation-Fixed
          path: TabA9Plus-Victory-Build.zip
