name: Tab A9+ GKI & KSUN Victory Build (Vermagic Fix)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git bc build-essential flex bison libssl-dev libelf-dev clang lld llvm gcc-aarch64-linux-gnu curl dos2unix cpio zip wget

      - name: 📥 Checkout Source
        uses: actions/checkout@v4

      - name: 🔐 Integrate KernelSU
        run: |
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
          
      - name: 🩹 Apply Deep Source Fixes (The "Twin Identity" Patch)
        run: |
          # 1. THE LOWERCASE PREEMPT FIX (WiFi/Rotation Fix)
          # This forces the kernel to identify as "preempt" instead of "PREEMPT"
          sed -i 's/\" PREEMPT \"/\" preempt \"/g' include/linux/vermagic.h || true
          
          # 2. THE NUCLEAR MODULE BYPASS
          # This tells the kernel to stop checking signatures and names entirely
          sed -i 's/return -ENOEXEC;/return 0;/g' kernel/module.c || true
          sed -i 's/same_magic = !strcmp(vermagic, modmagic);/same_magic = 1;/g' kernel/module.c || true

          # 3. Standard Samsung/Qualcomm Fixes
          sed -i 's/void try_schedule_zs_compact()/void try_schedule_zs_compact(void)/g' mm/zsmalloc.c || true
          find drivers/usb/typec -type d -name "inc" | while read -r incdir; do
            parent=$(dirname "$incdir")
            cp -r "$incdir"/* "$parent/" || true
          done
          find drivers/usb/typec -type f -exec sed -i 's|#include "inc/|#include "|g' {} +
          sed -i 's/static md_dump_slabinfo/static int md_dump_slabinfo/g' drivers/soc/qcom/minidump_log.c || true
          sed -i 's/static md_align_offset/static int md_align_offset/g' drivers/soc/qcom/minidump_log.c || true
          find . -name "Makefile" -o -name "Kbuild" | xargs sed -i 's/-Werror//g' || true

      - name: ⚙️ Configure Kernel (The "GKI & Lowercase" Setup)
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_stock_defconfig
          
          # 🛑 SATISFYING KSUN (Stripping the 'q')
          ./scripts/config --file .config --set-str CONFIG_LOCALVERSION "-gki"
          
          # 🛑 FORCING VOLUNTARY PREEMPTION (This creates the lowercase 'preempt' string)
          ./scripts/config --file .config --enable CONFIG_PREEMPT_VOLUNTARY
          ./scripts/config --file .config --disable CONFIG_PREEMPT
          
          # 🛑 FIXING ROTATION (Force Sensor Hub to Built-in)
          ./scripts/config --file .config --set-val CONFIG_INPUT_SENSORHUB y
          ./scripts/config --file .config --set-val CONFIG_SENSORS_SSC y
          ./scripts/config --file .config --set-val CONFIG_IIO y

          # 🛑 MODULE OVERRIDE
          ./scripts/config --file .config --disable CONFIG_MODULE_SIG
          ./scripts/config --file .config --enable CONFIG_MODULE_FORCE_LOAD
          ./scripts/config --file .config --enable CONFIG_KSU
          
          yes "" | make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

      - name: 🔨 Compile Kernel
        run: |
          # The scmversion match
          echo "-gki" > .scmversion
          
          export ARCH=arm64
          FLAGS="ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 HOSTCC=gcc CC=clang -j$(nproc --all)"
          K_INC="-I$(pwd)/security/selinux/include -I$(pwd)/drivers"
          K_CFLAGS="-w -D__LINUX_ARM_ARCH__=8 $K_INC"
          
          make $FLAGS Image KCFLAGS="$K_CFLAGS"

      - name: 📦 Package Output
        if: success()
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          cp arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          zip -r9 ../TabA9Plus-Perfect-Match.zip *

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TabA9Plus-Perfect-Match
          path: TabA9Plus-Perfect-Match.zip
