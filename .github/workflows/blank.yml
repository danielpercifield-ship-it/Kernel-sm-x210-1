name: Tab A9+ WiFi & Rotation Final Victory
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git bc build-essential flex bison libssl-dev libelf-dev clang lld llvm gcc-aarch64-linux-gnu curl dos2unix cpio zip wget

      - name: 📥 Checkout Source
        uses: actions/checkout@v4

      - name: 🔐 Integrate KernelSU
        run: |
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
          
      - name: 🩹 Apply Deep Source Fixes (Surgical Precision)
        run: |
          # 1. Surgical -Werror removal
          find . -type f \( -name "Makefile" -o -name "Kbuild" -o -name "*.include" -o -name "*.mk" \) -exec sed -i 's/ -Werror/ /g' {} + || true
          
          # 2. THE IDENTITY BYPASS
          sed -i 's/return -ENOEXEC;/return 0;/g' kernel/module.c || true
          sed -i 's/same_magic = !strcmp(vermagic, modmagic);/same_magic = 1;/g' kernel/module.c || true
          
          # 3. FIX VERMAGIC
          sed -i 's/\" PREEMPT \"/\" preempt \"/g' include/linux/vermagic.h || true
          
          # 4. 🚀 THE TRACE.H FIX (Writing the C code into the file)
          # This uses 'cat' to overwrite the inclusion logic at the end of the file
          sed -i '/#include <trace\/define_trace.h>/d' kernel/sched/walt/trace.h || true
          cat <<EOF >> kernel/sched/walt/trace.h

          /* Manual fix for Trace pathing */
             #undef TRACE_INCLUDE_PATH
             #define TRACE_INCLUDE_PATH ../../kernel/sched/walt
             #define TRACE_INCLUDE_FILE trace
             #include <trace/define_trace.h>
           EOF


      - name: ⚙️ Configure Kernel
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_stock_defconfig
          
          # SETTINGS FOR KERNELSU AND BOOTLOADER ACCEPTANCE
          ./scripts/config --file .config --set-str CONFIG_LOCALVERSION "-gki"
          ./scripts/config --file .config --enable CONFIG_PREEMPT
          ./scripts/config --file .config --disable LTO_CLANG
          ./scripts/config --file .config --enable CONFIG_KSU
          
          # WI-FI & SENSORS AS MODULES (Most stable for Tab A9+)
          ./scripts/config --file .config --set-val CONFIG_WLAN y
          ./scripts/config --file .config --set-val CONFIG_QCACLD_WLAN y
          
          yes "" | make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

      - name: 🔨 Compile Kernel
        run: |
          # 1. Restore the original Makefile if possible (git checkout Makefile)
          git checkout Makefile 2>/dev/null || true
          
          # 2. Compile with global warning suppression
          # This is SAFER than sed-ing the source code.
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 \
          KCFLAGS="-w -Wno-error" HOSTCFLAGS="-w" HOSTCXXFLAGS="-w" \
          -j$(nproc --all) Image modules 2>&1 | tee build.log

      - name: 📦 Package Result
        if: success()
        run: |
          if [ -f arch/arm64/boot/Image ]; then
            mkdir -p out/modules
            find . -name "*.ko" -exec cp {} out/modules/ \;
            cp arch/arm64/boot/Image out/
            cd out && zip -r ../TabA9Plus-Victory.zip *
          else
            exit 1
          fi

      - name: 📤 Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TabA9Plus-Victory
          path: TabA9Plus-Victory.zip

