name: Tab A9+ GKI Victory Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git bc build-essential flex bison libssl-dev libelf-dev clang lld llvm gcc-aarch64-linux-gnu curl dos2unix cpio zip wget

      - name: 📥 Checkout Source
        uses: actions/checkout@v4

      - name: 🔐 Integrate KernelSU
        run: |
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
          
      - name: 🩹 Apply Source Patches
        run: |
          # 1. SURGICAL WARNING BYPASS
          # Only removes the specific error flags, leaving the rest of the Makefile syntax intact.
          find . -type f \( -name "Makefile" -o -name "Kbuild" \) -exec sed -i 's/-Wno-error=strict-prototypes//g' {} +
          find . -type f \( -name "Makefile" -o -name "Kbuild" \) -exec sed -i 's/-Wno-error=implicit-function-declaration//g' {} +
          find . -type f \( -name "Makefile" -o -name "Kbuild" \) -exec sed -i 's/-Wno-error=implicit-int//g' {} +
          find . -type f \( -name "Makefile" -o -name "Kbuild" \) -exec sed -i 's/-Wno-error=return-type//g' {} +
          find . -type f \( -name "Makefile" -o -name "Kbuild" \) -exec sed -i 's/-Wno-error=unknown-warning-option//g' {} +
          
          # 2. GLOBAL ERROR DISABLE
          # This tells the top-level Makefile to stop treating warnings as errors globally.
          sed -i 's/KBUILD_CFLAGS += -Werror/KBUILD_CFLAGS += -w/g' Makefile || true


          # 1. THE CASE-SENSITIVITY FIX (WiFi/BT Fix)
          # Forces the kernel to say "preempt" instead of "PREEMPT" to match factory drivers
          sed -i 's/\" PREEMPT \"/\" preempt \"/g' include/linux/vermagic.h || true
          
          # 2. THE IDENTITY BYPASS
          # Tells the kernel to ignore name mismatches (loads -qgki drivers into -gki kernel)
          sed -i 's/return -ENOEXEC;/return 0;/g' kernel/module.c || true
          sed -i 's/same_magic = !strcmp(vermagic, modmagic);/same_magic = 1;/g' kernel/module.c || true

          # 3. Standard Samsung/Qualcomm Typos
          sed -i 's/void try_schedule_zs_compact()/void try_schedule_zs_compact(void)/g' mm/zsmalloc.c || true
          sed -i 's/static md_dump_slabinfo/static int md_dump_slabinfo/g' drivers/soc/qcom/minidump_log.c || true
          sed -i 's/static md_align_offset/static int md_align_offset/g' drivers/soc/qcom/minidump_log.c || true
          find techpack/display -name "*.c" -exec sed -i 's/static inline _/static inline u32 _/g' {} + || true

          # 4. NUCLEAR USB-C FIX (Header Flattening)
          find drivers/usb/typec -type d -name "inc" | while read -r incdir; do
            parent=$(dirname "$incdir")
            cp -r "$incdir"/* "$parent/" || true
          done
          find drivers/usb/typec -type f -exec sed -i 's|#include "inc/|#include "|g' {} +

          # 5. CLEAN MAKEFILES (Removes the -Werror that is causing your current crash)
          find . -name "Makefile" -o -name "Kbuild" | xargs sed -i 's/-Werror//g' || true

      - name: ⚙️ Configure Kernel
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_stock_defconfig
          
          # Force the clean -gki name for KSUN support
          ./scripts/config --file .config --set-str CONFIG_LOCALVERSION "-gki"
          
          # Match the preemption model to factory drivers (Lowercase 'preempt')
          ./scripts/config --file .config --enable CONFIG_PREEMPT_VOLUNTARY
          ./scripts/config --file .config --disable CONFIG_PREEMPT
          
          # Force rotation sensors to be Built-in (y)
          ./scripts/config --file .config --set-val CONFIG_INPUT_SENSORHUB y
          ./scripts/config --file .config --set-val CONFIG_SENSORS_SSC y
          ./scripts/config --file .config --set-val CONFIG_IIO y
          
          # Built-in WiFi (Squad MVP)
          ./scripts/config --file .config --set-val CONFIG_WLAN y
          ./scripts/config --file .config --set-val CONFIG_QCACLD_WLAN y
          
          ./scripts/config --file .config --enable CONFIG_KSU
          yes "" | make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

      - name: 🔨 Compile Kernel
        run: |
          unset KCFLAGS CFLAGS
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
          CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm STRIP=llvm-strip \
          OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
          KCFLAGS="-w" \
          -j$(nproc --all) Image

      - name: 📦 Package Result
        if: success()
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          cp arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          zip -r9 ../TabA9Plus-Perfect-Build.zip *

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TabA9Plus-Perfect-Build
          path: TabA9Plus-Perfect-Build.zip
