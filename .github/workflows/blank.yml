name: Tab A9+ WiFi & Rotation Final V1ctory
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git bc build-essential flex bison libssl-dev libelf-dev clang lld llvm gcc-aarch64-linux-gnu curl dos2unix cpio zip wget

      - name: 📥 Checkout Source
        uses: actions/checkout@v4

      - name: 🔐 Integrate KernelSU
        run: |
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
          
      - name: 🩹 Apply Deep Source Fixes (Surgical Precision)
        run: |
          sed -i '/Manual fix for Trace pathing/d' kernel/sched/walt/trace.h || true
          sed -i '/TRACE_INCLUDE_PATH/d' kernel/sched/walt/trace.h || true
          sed -i '/#include <trace\/define_trace.h>/d' kernel/sched/walt/trace.h || true
          
          cat <<'EOF' >> kernel/sched/walt/trace.h
          /* Manual fix for Trace pathing */
          #undef TRACE_INCLUDE_PATH
          #define TRACE_INCLUDE_PATH ../../kernel/sched/walt
          #define TRACE_INCLUDE_FILE trace
          #include <trace/define_trace.h>
          EOF
        
          find drivers/usb/typec/P86801_tcpc -type f -name "*.h" -exec sed -i 's|#include "inc/|#include "|g' {} + || true
          find drivers/usb/typec/P86801_tcpc -type f -name "*.c" -exec sed -i 's|#include "inc/|#include "|g' {} + || true
          echo "subdir-ccflags-y += -Idrivers/usb/typec/P86801_tcpc/inc" >> drivers/usb/typec/P86801_tcpc/Makefile || true
      
      - name: 🛡️ IDENTITY CLONE & ANTI-DIRTY TAG
        run: |
          sed -i 's/^EXTRAVERSION =.*/EXTRAVERSION = -qgki-28972655-abX210XXS6CYB9/' Makefile
          sed -i 's/res="$res-dirty"/res="$res"/' scripts/setlocalversion
          sed -i 's/res="$res+"//' scripts/setlocalversion
          echo "" > .scmversion

      - name: ⚙️ Configure Kernel
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_stock_defconfig
          ./scripts/config --file .config --set-str CONFIG_LOCALVERSION ""
          ./scripts/config --file .config --enable CONFIG_PREEMPT
          ./scripts/config --file .config --disable LTO_CLANG
          ./scripts/config --file .config --enable CONFIG_KSU
          ./scripts/config --file .config --disable CONFIG_MODULE_SIG
          ./scripts/config --file .config --disable CONFIG_MODVERSIONS
          ./scripts/config --file .config --enable CONFIG_MODULE_FORCE_LOAD
          ./scripts/config --file .config --enable CONFIG_SECURITY_SELINUX_DEVELOP

          yes "" | make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

      - name: 🔨 Compile Kernel (Image Only)
        run: |
          # Removed 'modules' to save time and prevent syntax errors
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 LOCALVERSION="" KCFLAGS="-w -Wno-error" HOSTCFLAGS="-w" HOSTCXXFLAGS="-w" -j$(nproc --all) Image.gz Image 2>&1 | tee build.log

      - name: 📦 Package Result
        if: success()
        run: |
          mkdir -p out
          if [ -f arch/arm64/boot/Image ]; then
            cp arch/arm64/boot/Image out/
            # Zip just the Image for easy transfer
            cd out && zip -r ../TabA9Plus-Kernel-Only.zip *
          else
            echo "Error: Image not found!" && exit 1
          fi

      - name: 📤 Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TabA9Plus-Kernel-Only
          path: TabA9Plus-Kernel-Only.zip
