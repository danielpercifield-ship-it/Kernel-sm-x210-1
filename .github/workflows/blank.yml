name: Tab A9+ WiFi & Rotation Final Victory
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git bc build-essential flex bison libssl-dev libelf-dev clang lld llvm gcc-aarch64-linux-gnu curl dos2unix cpio zip wget

      - name: 📥 Checkout Source
        uses: actions/checkout@v4

      - name: 🔐 Integrate KernelSU
        run: |
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
          
      - name: 🩹 Apply Deep Source Fixes (The "Scrapper" Cleanup)
        run: |
          # 1. THE TARGETED MAKEFILE CLEANUP
          # This removes -Werror and anything attached to it (like -Werror=...)
          find . -type f \( -name "Makefile" -o -name "Kbuild" -o -name "*.include" -o -name "*.mk" \) \
          -exec sed -i 's/-Werror[^ ]*//g' {} + || true
          find . -type f \( -name "Makefile" -o -name "Kbuild" -o -name "*.include" -o -name "*.mk" \) \
          -exec sed -i 's/-Wno-error[^ ]*//g' {} + || true

          # 2. THE IDENTITY BYPASS (Loads -qgki drivers into -gki kernel)
          sed -i 's/return -ENOEXEC;/return 0;/g' kernel/module.c || true
          sed -i 's/same_magic = !strcmp(vermagic, modmagic);/same_magic = 1;/g' kernel/module.c || true


      - name: ⚙️ Configure Kernel (Matching Stock Match)
        run: |
          # Load your specific defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_stock_defconfig
          
          # 🛑 THE NAME FIX (Satisfies KSUN)
          ./scripts/config --file .config --set-str CONFIG_LOCALVERSION "-gki"
          
          # 🛑 THE PREEMPTION MATCH (Stock said 'PREEMPT' uppercase)
          ./scripts/config --file .config --enable CONFIG_PREEMPT
          ./scripts/config --file .config --disable CONFIG_PREEMPT_VOLUNTARY
          
          # 🛑 FORCE HARDWARE BUILT-IN (Bypasses modules entirely)
          ./scripts/config --file .config --set-val CONFIG_WLAN y
          ./scripts/config --file .config --set-val CONFIG_QCACLD_WLAN y
          ./scripts/config --file .config --set-val CONFIG_WLAN_VENDOR_QCOM y
          ./scripts/config --file .config --set-val CONFIG_INPUT_SENSORHUB y
          ./scripts/config --file .config --set-val CONFIG_SENSORS_SSC y
          ./scripts/config --file .config --set-val CONFIG_IIO y
          
          # Disable problematic features and enable KSU
          ./scripts/config --file .config --disable LTO_CLANG
          ./scripts/config --file .config --disable RELR
          ./scripts/config --file .config --enable CONFIG_KSU
          
          yes "" | make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

      - name: 🔨 Compile Kernel
        run: |
          echo "-28972655-abX210XXS6CYB9" > .scmversion
          export ARCH=arm64
          
          # Simplified KCFLAGS: We let the Makefiles handle the includes, 
          # just forcing 'ignore warnings' (-w)
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 \
          KCFLAGS="-w" HOSTCFLAGS="-w" HOSTCXXFLAGS="-w" \
          -j$(nproc --all) Image 2>&1 | tee build.log


      - name: 📋 Build Summary
        if: always()
        run: |
          echo "::group::❌ VIEW FATAL ERRORS"
          grep -i "error:" build.log || echo "No errors found."
          echo "::endgroup::"

      - name: 📦 Package Result
        if: success()
        run: |
          if [ -f arch/arm64/boot/Image ]; then
            git clone https://github.com/osm0sis/AnyKernel3.git
            sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
            cp arch/arm64/boot/Image AnyKernel3/
            cd AnyKernel3 && zip -r9 ../TabA9Plus-Victory.zip *
          else
            exit 1
          fi

      - name: 📤 Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TabA9Plus-Victory
          path: TabA9Plus-Victory.zip
